<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "title" .}}Autopsy{{end}}</title>
  <!-- Apply dark class before first paint to prevent flash of wrong theme -->
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    /* Hide HTMX indicators until a request is in flight (prevents spinner showing on initial load) */
    .htmx-indicator { opacity: 0; visibility: hidden; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { opacity: 1; visibility: visible; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.1/sse.js"></script>
  <script>console.log('HTMX loaded:', typeof htmx !== 'undefined' ? htmx.version : 'NOT LOADED - check SRI hash or network');</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-200">

  {{if .StubMode}}
  <div class="bg-amber-50 dark:bg-amber-900/20 border-b border-amber-200 dark:border-amber-800 px-6 py-2 text-sm text-amber-700 dark:text-amber-400 flex items-center gap-2">
    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
    </svg>
    Stub mode — set <code class="font-mono bg-amber-100 dark:bg-amber-900/40 px-1 rounded">ANTHROPIC_API_KEY</code> for live analysis
  </div>
  {{end}}

  <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 text-gray-900 dark:text-white font-semibold text-lg hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
      <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Autopsy
    </a>
    <div class="flex items-center gap-3">
      <a href="/" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">Home</a>
      <a href="/upload" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">New Analysis</a>
      <a href="/bundles" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">Past Bundles</a>
      {{if .User}}
      <div class="flex items-center gap-2 border-l border-gray-200 dark:border-gray-700 pl-3">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold
          {{if eq .User.Role "isv"}}bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300
          {{else}}bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-300{{end}}">{{.User.Initials}}</div>
        <span class="text-sm text-gray-700 dark:text-gray-300 hidden sm:inline">{{.User.Name}}</span>
        <a href="/logout" class="text-xs text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">Sign out</a>
      </div>
      {{end}}
      <button id="theme-toggle" onclick="toggleDark()"
              class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
              aria-label="Toggle dark mode">
        <!-- Moon — shown in light mode -->
        <svg id="icon-moon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <!-- Sun — shown in dark mode -->
        <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="flex-1 {{block "main_class" .}}max-w-7xl mx-auto px-6 py-8{{end}}">
    {{block "content" .}}{{end}}
  </main>

  {{block "scripts" .}}{{end}}

  <script>
  function toggleDark() {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('icon-moon').classList.toggle('hidden', isDark);
    document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
  }
  // Sync icon to current theme on load
  (function() {
    if (document.documentElement.classList.contains('dark')) {
      document.getElementById('icon-moon').classList.add('hidden');
      document.getElementById('icon-sun').classList.remove('hidden');
    }
  })();
  </script>

</body>
</html>
