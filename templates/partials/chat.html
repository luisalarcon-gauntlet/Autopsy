{{define "chat_messages"}}
{{- /* Data: struct{ UserMessage, Response string } */ -}}
<div class="flex justify-end mb-3">
  <div class="bg-blue-600 text-white rounded-2xl rounded-br-sm px-4 py-2 max-w-xs text-sm leading-relaxed break-words">
    {{.UserMessage}}
  </div>
</div>
<div class="flex justify-start mb-3">
  <div class="bg-gray-100 text-gray-800 rounded-2xl rounded-bl-sm px-4 py-2 max-w-sm text-sm leading-relaxed break-words">
    {{.Response}}
  </div>
</div>
{{end}}

{{define "chat_suggestions"}}
{{- /* Data: []string — list of suggested question strings */ -}}
<div class="px-4 pb-3 pt-2 flex flex-wrap gap-2">
  {{range .}}
  <button type="button"
          class="suggestion-pill text-xs bg-blue-50 text-blue-700 border border-blue-200
                 rounded-full px-3 py-1.5 hover:bg-blue-100 active:bg-blue-200 transition-colors text-left"
          data-question="{{.}}">
    {{.}}
  </button>
  {{end}}
</div>
{{end}}
