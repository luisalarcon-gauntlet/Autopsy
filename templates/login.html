<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autopsy — Sign In</title>
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col items-center justify-center">

  <div class="mb-8 text-center">
    <div class="flex items-center justify-center gap-2 mb-2">
      <svg class="w-8 h-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span class="text-2xl font-bold text-gray-900 dark:text-white">Autopsy</span>
    </div>
    <p class="text-gray-500 dark:text-gray-400 text-sm">Support Bundle Analyzer</p>
  </div>

  <div class="w-full max-w-2xl px-4">
    <h1 class="text-center text-lg font-semibold text-gray-900 dark:text-white mb-5">Choose your account</h1>
    <div class="grid grid-cols-2 gap-4">

      <form method="post" action="/login">
        <input type="hidden" name="username" value="airbyte" />
        <button type="submit"
                class="w-full text-left bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-xl p-6 hover:border-blue-400 dark:hover:border-blue-500 hover:shadow-md transition-all group cursor-pointer">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center text-blue-700 dark:text-blue-300 font-semibold text-sm flex-shrink-0">SC</div>
            <div>
              <p class="font-semibold text-gray-900 dark:text-white text-sm">Sarah Chen</p>
              <p class="text-xs text-blue-600 dark:text-blue-400 font-medium">Airbyte Support</p>
            </div>
          </div>
          <p class="text-sm text-gray-500 dark:text-gray-400">Upload and analyze support bundles for your customers.</p>
          <p class="mt-4 text-sm font-medium text-blue-600 dark:text-blue-400 group-hover:underline">Sign in →</p>
        </button>
      </form>

      <form method="post" action="/login">
        <input type="hidden" name="username" value="replicated" />
        <button type="submit"
                class="w-full text-left bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-xl p-6 hover:border-red-400 dark:hover:border-red-500 hover:shadow-md transition-all group cursor-pointer">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/40 flex items-center justify-center text-red-700 dark:text-red-300 font-semibold text-sm flex-shrink-0">MJ</div>
            <div>
              <p class="font-semibold text-gray-900 dark:text-white text-sm">Marcus Johnson</p>
              <p class="text-xs text-red-600 dark:text-red-400 font-medium">Replicated Support</p>
            </div>
          </div>
          <p class="text-sm text-gray-500 dark:text-gray-400">Monitor ISV partners and triage incoming support bundles.</p>
          <p class="mt-4 text-sm font-medium text-red-600 dark:text-red-400 group-hover:underline">Sign in →</p>
        </button>
      </form>

    </div>
  </div>

</body>
</html>
